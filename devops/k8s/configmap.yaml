apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudlink-config
  namespace: cloudlink
  labels:
    app.kubernetes.io/name: cloudlink
    app.kubernetes.io/component: config
data:
  PORT: "5000"
  NODE_ENV: "production"
  BASE_URL: "http://cloudlink.local"
  MONGO_HOST: "mongodb-service"
  MONGO_PORT: "27017"
  MONGO_DB: "url-shortener"
  BACKEND_HOST: "backend-service"
  BACKEND_PORT: "5000"
