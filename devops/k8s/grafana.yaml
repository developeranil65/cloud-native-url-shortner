apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: cloudlink
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: cloudlink
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: 'CloudLink Dashboards'
        orgId: 1
        folder: 'CloudLink'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: cloudlink
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
