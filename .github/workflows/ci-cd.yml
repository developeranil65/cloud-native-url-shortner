# =============================================================================
# CI/CD Pipeline - Cloud Native URL Shortener
# =============================================================================
# Registry: DockerHub
# Triggers on pushes to main and pull requests.
# Steps: Lint → Test → Build Docker Images → Push to DockerHub → Deploy (simulated)
# =============================================================================

name: CloudLink CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKERHUB_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-backend
  DOCKERHUB_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-frontend

jobs:
  # ===========================================================================
  # Job 1: Test Backend
  # ===========================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run linter (if configured)
        run: npx eslint . --ext .js || true
        working-directory: ./backend

      - name: Run tests (if configured)
        run: npm test || echo "No tests configured yet"
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://mongodb:27017/url-shortener-test
          PORT: 5000
          BASE_URL: http://backend:5000

  # ===========================================================================
  # Job 2: Build & Push Docker Images to DockerHub
  # ===========================================================================
  build-and-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Login to DockerHub
      # -----------------------------------------------------------------------
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate image tags
      # -----------------------------------------------------------------------
      - name: Generate image metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate image metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # -----------------------------------------------------------------------
      # Build and push Backend image
      # -----------------------------------------------------------------------
      - name: Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Build and push Frontend image
      # -----------------------------------------------------------------------
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 3: Simulate Deployment
  # ===========================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          timeout: 5m
          command_timeout: 15m
          envs: DOCKERHUB_USERNAME
          script: |
            set -e

            echo "Setting up deployment directory..."
            sudo mkdir -p /opt/cloudlink
            sudo chown ubuntu:ubuntu /opt/cloudlink
            cd /opt/cloudlink

            echo "Writing docker-compose.yml..."
            cat > docker-compose.yml << 'EOF'
            services:
              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-frontend:latest
                container_name: cloudlink-frontend
                ports:
                  - "80:80"
                environment:
                  - BACKEND_HOST=backend
                  - BACKEND_PORT=5000
                  - API_BASE_URL=/api
                  - BASE_URL=
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - cloudlink-network
                restart: unless-stopped

              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-backend:latest
                container_name: cloudlink-backend
                ports:
                  - "5000:5000"
                environment:
                  - PORT=5000
                  - MONGO_URI=mongodb://mongodb:27017/url-shortener
                  - BASE_URL=http://frontend
                  - NODE_ENV=production
                depends_on:
                  mongodb:
                    condition: service_healthy
                networks:
                  - cloudlink-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 15s

              mongodb:
                image: mongo:7
                container_name: cloudlink-mongodb
                volumes:
                  - mongo-data:/data/db
                networks:
                  - cloudlink-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s

            volumes:
              mongo-data:
                driver: local

            networks:
              cloudlink-network:
                driver: bridge
            EOF

            echo "Pulling latest images..."
            sudo docker compose pull

            echo "Stopping old containers..."
            sudo docker compose down --remove-orphans || true
            sudo docker rm -f cloudlink-frontend cloudlink-backend cloudlink-mongodb 2>/dev/null || true

            echo "Starting containers..."
            sudo docker compose up -d

            echo "Deployment successful! Current status:"
            sudo docker compose ps
