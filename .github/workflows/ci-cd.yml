# =============================================================================
# CI/CD Pipeline - Cloud Native URL Shortener
# =============================================================================
# Registry: DockerHub
# Triggers on pushes to main and pull requests.
# Steps: Lint → Test → Build Docker Images → Push to DockerHub → Deploy (simulated)
# =============================================================================

name: CloudLink CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKERHUB_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-backend
  DOCKERHUB_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-frontend

jobs:
  # ===========================================================================
  # Job 1: Test Backend
  # ===========================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run linter (if configured)
        run: npx eslint . --ext .js || true
        working-directory: ./backend

      - name: Run tests (if configured)
        run: npm test || echo "No tests configured yet"
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://mongodb:27017/url-shortener-test
          PORT: 5000
          BASE_URL: http://backend:5000

  # ===========================================================================
  # Job 2: Build & Push Docker Images to DockerHub
  # ===========================================================================
  build-and-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Login to DockerHub
      # -----------------------------------------------------------------------
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate image tags
      # -----------------------------------------------------------------------
      - name: Generate image metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate image metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # -----------------------------------------------------------------------
      # Build and push Backend image
      # -----------------------------------------------------------------------
      - name: Build & Push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Build and push Frontend image
      # -----------------------------------------------------------------------
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 3: Simulate Deployment
  # ===========================================================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          timeout: 5m
          command_timeout: 15m
          envs: DOCKERHUB_USERNAME
          script: |
            set -e

            echo "Setting up deployment directory..."
            sudo mkdir -p /opt/cloudlink
            sudo chown ubuntu:ubuntu /opt/cloudlink
            cd /opt/cloudlink

            echo "Writing docker-compose.yml..."
            cat > docker-compose.yml << 'EOF'
            services:
              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-frontend:latest
                container_name: cloudlink-frontend
                ports:
                  - "80:80"
                environment:
                  - BACKEND_HOST=backend
                  - BACKEND_PORT=5000
                  - API_BASE_URL=/api
                  - BASE_URL=
                depends_on:
                  backend:
                    condition: service_healthy
                networks:
                  - cloudlink-network
                restart: unless-stopped

              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/cloudlink-backend:latest
                container_name: cloudlink-backend
                ports:
                  - "5000:5000"
                environment:
                  - PORT=5000
                  - MONGO_URI=mongodb://mongodb:27017/url-shortener
                  - BASE_URL=http://frontend
                  - NODE_ENV=production
                depends_on:
                  mongodb:
                    condition: service_healthy
                networks:
                  - cloudlink-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 15s

              mongodb:
                image: mongo:7
                container_name: cloudlink-mongodb
                volumes:
                  - mongo-data:/data/db
                networks:
                  - cloudlink-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s

              prometheus:
                image: prom/prometheus:latest
                container_name: cloudlink-prometheus
                ports:
                  - "9090:9090"
                volumes:
                  - prometheus-data:/prometheus
                  - /opt/cloudlink/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                command:
                  - '--config.file=/etc/prometheus/prometheus.yml'
                  - '--storage.tsdb.path=/prometheus'
                  - '--web.enable-lifecycle'
                networks:
                  - cloudlink-network
                restart: unless-stopped

              grafana:
                image: grafana/grafana:latest
                container_name: cloudlink-grafana
                ports:
                  - "3000:3000"
                environment:
                  - GF_AUTH_ANONYMOUS_ENABLED=true
                  - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
                  - GF_AUTH_DISABLE_LOGIN_FORM=true
                volumes:
                  - grafana-data:/var/lib/grafana
                  - /opt/cloudlink/grafana/datasources:/etc/grafana/provisioning/datasources:ro
                  - /opt/cloudlink/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
                  - /opt/cloudlink/grafana/json:/var/lib/grafana/dashboards:ro
                depends_on:
                  - prometheus
                networks:
                  - cloudlink-network
                restart: unless-stopped

            volumes:
              mongo-data:
                driver: local
              prometheus-data:
                driver: local
              grafana-data:
                driver: local

            networks:
              cloudlink-network:
                driver: bridge
            EOF

            echo "Writing prometheus config..."
            cat > prometheus.yml << 'PROMEOF'
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: 'cloudlink-backend'
                metrics_path: '/metrics'
                scrape_interval: 10s
                static_configs:
                  - targets: ['backend:5000']
                    labels:
                      service: 'backend'
            PROMEOF

            echo "Writing Grafana provisioning files..."
            mkdir -p grafana/datasources grafana/dashboards grafana/json

            cat > grafana/datasources/datasource.yml << 'DSEOF'
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                access: proxy
                url: http://prometheus:9090
                isDefault: true
                editable: true
            DSEOF

            cat > grafana/dashboards/dashboard.yml << 'DBEOF'
            apiVersion: 1
            providers:
              - name: 'CloudLink Dashboards'
                orgId: 1
                folder: 'CloudLink'
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards
            DBEOF

            cat > grafana/json/cloudlink-dashboard.json << 'JSONEOF'
            {"annotations":{"list":[]},"editable":true,"fiscalYearStartMonth":0,"graphTooltip":1,"id":null,"links":[],"panels":[{"title":"Total HTTP Requests","type":"stat","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":6,"w":6,"x":0,"y":0},"targets":[{"expr":"sum(http_requests_total{service=\"backend\"})","legendFormat":"Total Requests"}],"fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":1000},{"color":"red","value":5000}]}}}},{"title":"Request Rate (req/s)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":6,"y":0},"targets":[{"expr":"rate(http_requests_total{service=\"backend\"}[5m])","legendFormat":"{{method}} {{route}} [{{code}}]"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","lineWidth":2,"fillOpacity":15,"gradientMode":"scheme","pointSize":5,"showPoints":"auto"},"color":{"mode":"palette-classic"},"unit":"reqps"}}},{"title":"Requests by Status Code","type":"piechart","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":6,"w":6,"x":18,"y":0},"targets":[{"expr":"sum by(code) (http_requests_total{service=\"backend\"})","legendFormat":"{{code}}"}]},{"title":"Request Duration (p50 / p95 / p99)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"expr":"histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{service=\"backend\"}[5m])) by (le))","legendFormat":"p50"},{"expr":"histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"backend\"}[5m])) by (le))","legendFormat":"p95"},{"expr":"histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service=\"backend\"}[5m])) by (le))","legendFormat":"p99"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","lineWidth":2,"fillOpacity":10,"gradientMode":"scheme"},"color":{"mode":"palette-classic"},"unit":"s"}}},{"title":"CPU Usage","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"expr":"rate(process_cpu_user_seconds_total{service=\"backend\"}[5m])","legendFormat":"User CPU"},{"expr":"rate(process_cpu_system_seconds_total{service=\"backend\"}[5m])","legendFormat":"System CPU"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","lineWidth":2,"fillOpacity":20,"gradientMode":"scheme"},"color":{"mode":"palette-classic"},"unit":"percentunit"}}},{"title":"Memory Usage (Heap)","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"nodejs_heap_size_used_bytes{service=\"backend\"}","legendFormat":"Heap Used"},{"expr":"nodejs_heap_size_total_bytes{service=\"backend\"}","legendFormat":"Heap Total"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","lineWidth":2,"fillOpacity":15,"gradientMode":"scheme"},"color":{"mode":"palette-classic"},"unit":"bytes"}}},{"title":"Active Handles & Requests","type":"timeseries","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"nodejs_active_handles_total{service=\"backend\"}","legendFormat":"Active Handles"},{"expr":"nodejs_active_requests_total{service=\"backend\"}","legendFormat":"Active Requests"}],"fieldConfig":{"defaults":{"custom":{"drawStyle":"line","lineWidth":2,"fillOpacity":10},"color":{"mode":"palette-classic"}}}}],"schemaVersion":39,"tags":["cloudlink","url-shortener","node"],"templating":{"list":[]},"time":{"from":"now-1h","to":"now"},"timepicker":{},"timezone":"browser","title":"CloudLink - URL Shortener Dashboard","uid":"cloudlink-dashboard","version":1}
            JSONEOF

            echo "Pulling latest images..."
            sudo docker compose pull

            echo "Stopping old containers..."
            sudo docker compose down --remove-orphans || true
            sudo docker rm -f cloudlink-frontend cloudlink-backend cloudlink-mongodb cloudlink-prometheus cloudlink-grafana 2>/dev/null || true

            echo "Starting containers..."
            sudo docker compose up -d

            echo "Deployment successful! Current status:"
            sudo docker compose ps
