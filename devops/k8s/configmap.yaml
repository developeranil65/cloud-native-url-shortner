# =============================================================================
# ConfigMap - Application configuration values
# =============================================================================
# IMPORTANT: No localhost references. Use Kubernetes service names.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudlink-config
  namespace: cloudlink
  labels:
    app.kubernetes.io/name: cloudlink
    app.kubernetes.io/component: config
data:
  PORT: "5000"
  NODE_ENV: "production"
  # Use the Ingress hostname as the public-facing URL
  BASE_URL: "http://cloudlink.local"
  MONGO_HOST: "mongodb-service"
  MONGO_PORT: "27017"
  MONGO_DB: "url-shortener"
  # Frontend Nginx proxy target (K8s service name)
  BACKEND_HOST: "backend-service"
  BACKEND_PORT: "5000"
